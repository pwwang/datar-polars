name: CI

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        polars: [
          "polars>=1.36,<2",
          "polars",
        ]

    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv sync --extra all
          uv pip install -U "$POLARS"
        env:
          POLARS: ${{ matrix.polars }}
      - name: Show versions
        run: uv run python -c 'import datar; datar.get_versions()'
      - name: Test with pytest
        run: uv run pytest tests/ --junitxml=junit/test-results-${{ matrix.python-version }}-${{ matrix.polars }}.xml
      - name: Upload pytest test results
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results-${{ matrix.python-version }}-${{ matrix.polars }}
          path: junit/test-results-${{ matrix.python-version }}-${{ matrix.polars }}.xml
        if: ${{ always() }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build and publish to PyPI
        run: |
          uv build
          uv publish --token ${{ secrets.PYPI_PASSWORD }}
        if: success()
